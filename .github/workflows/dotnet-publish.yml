name: Publish .NET SDK to NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'grafana/sigil-sdk' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: NuGet.org
      url: https://www.nuget.org/profiles/Grafana

    permissions:
      contents: read
      id-token: write

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
      DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
      FORCE_COLOR: 3
      NUGET_XMLDOC_MODE: skip
      TERM: xterm

    steps:

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          global-json-file: dotnet/global.json

      - name: Pack
        env:
          PKG_VERSION: ${{ inputs.version }}
        run: |
          dotnet pack dotnet/Sigil.DotNet.slnx -c Release \
            -p:PackageVersion="${PKG_VERSION}"

      - name: NuGet log in
        uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1.1.0
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USERNAME }}

      - name: Publish
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          dotnet nuget push "dotnet/artifacts/package/release/*.nupkg" \
            --api-key "${NUGET_API_KEY}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
