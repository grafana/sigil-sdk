// Canonical Agento11y ingest schema. This is the source of truth for every
// SDK; proto/sigil/v1 is the frozen legacy copy kept for the migration window.
syntax = "proto3";

package agento11y.v1;

option go_package = "github.com/grafana/agento11y/go/proto/agento11y/v1;agento11yv1";
// Without this option protoc derives "Agento11Y.V1" (capital after digits).
option csharp_namespace = "Agento11y.V1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

service GenerationIngestService {
  rpc ExportGenerations(ExportGenerationsRequest)
      returns (ExportGenerationsResponse);
}

message ExportGenerationsRequest { repeated Generation generations = 1; }

message ExportGenerationsResponse {
  repeated ExportGenerationResult results = 1;
}

message ExportGenerationResult {
  string generation_id = 1;
  bool accepted = 2;
  string error = 3;
}

enum GenerationMode {
  GENERATION_MODE_UNSPECIFIED = 0;
  GENERATION_MODE_SYNC = 1;
  GENERATION_MODE_STREAM = 2;
}

message ModelRef {
  string provider = 1;
  string name = 2;
}

enum MessageRole {
  MESSAGE_ROLE_UNSPECIFIED = 0;
  MESSAGE_ROLE_USER = 1;
  MESSAGE_ROLE_ASSISTANT = 2;
  MESSAGE_ROLE_TOOL = 3;
}

message PartMetadata { string provider_type = 1; }

message ToolCall {
  string id = 1;
  string name = 2;
  bytes input_json = 3;
}

message ToolResult {
  string tool_call_id = 1;
  string name = 2;
  string content = 3;
  bytes content_json = 4;
  bool is_error = 5;
}

message Media {
  string kind = 1;
  string url = 2;
  string mime_type = 3;
  string name = 4;
}

message Part {
  PartMetadata metadata = 1;

  oneof payload {
    string text = 2;
    string thinking = 3;
    ToolCall tool_call = 4;
    ToolResult tool_result = 5;
    Media media = 6;
  }
}

message Message {
  MessageRole role = 1;
  string name = 2;
  repeated Part parts = 3;
}

message ToolDefinition {
  string name = 1;
  string description = 2;
  string type = 3;
  bytes input_schema_json = 4;
  bool deferred = 5;
}

message TokenUsage {
  // Fresh, non-cached input tokens. Provider adapters whose raw prompt/input
  // total includes cached tokens must subtract cache_read_input_tokens before
  // setting this field.
  int64 input_tokens = 1;
  // Output tokens as reported by the provider. For providers that include
  // reasoning/thinking tokens in output totals, keep that provider semantics
  // here and also populate reasoning_tokens when available.
  int64 output_tokens = 2;
  // Provider-reported total when available. If derived by an SDK, use the
  // disjoint bucket sum: input + output + cache_read + cache_write.
  int64 total_tokens = 3;
  // Cached input tokens read from the provider cache.
  int64 cache_read_input_tokens = 4;
  // Input tokens written to the provider cache.
  int64 cache_write_input_tokens = 5;
  // Provider-reported reasoning/thinking tokens when available.
  // This may overlap with output_tokens depending on provider semantics.
  // Treat it as an explanatory sub-bucket, not an additive total bucket.
  int64 reasoning_tokens = 6;
  reserved 7;
  reserved "cache_creation_input_tokens";
  // Self-describing marker set by SDK-owned adapters that have already
  // normalized this usage to the disjoint contract (input_tokens is fresh and
  // cache buckets are additive). Consumers must NOT re-derive fresh input
  // (e.g. subtract cache_read from input) when this is true.
  //
  // When false/absent the usage may be legacy cache-inclusive telemetry from an
  // older SDK, or a caller's manual usage the SDK did not reinterpret; consumers
  // may fall back to provider-name heuristics for those. SDK provider/framework
  // wrappers set this true; manual user-supplied usage leaves it false.
  bool input_is_disjoint = 8;
}

enum ArtifactKind {
  ARTIFACT_KIND_UNSPECIFIED = 0;
  ARTIFACT_KIND_REQUEST = 1;
  ARTIFACT_KIND_RESPONSE = 2;
  ARTIFACT_KIND_TOOLS = 3;
  ARTIFACT_KIND_PROVIDER_EVENT = 4;
}

message Artifact {
  ArtifactKind kind = 1;
  string name = 2;
  string content_type = 3;
  bytes payload = 4;
  string record_id = 5;
  string uri = 6;
}

message Generation {
  string id = 1;
  string conversation_id = 2;
  string operation_name = 3;
  GenerationMode mode = 4;
  string trace_id = 5;
  string span_id = 6;
  ModelRef model = 7;
  string response_id = 8;
  string response_model = 9;
  string system_prompt = 10;
  repeated Message input = 11;
  repeated Message output = 12;
  repeated ToolDefinition tools = 13;
  TokenUsage usage = 14;
  string stop_reason = 15;
  google.protobuf.Timestamp started_at = 16;
  google.protobuf.Timestamp completed_at = 17;
  map<string, string> tags = 18;
  google.protobuf.Struct metadata = 19;
  repeated Artifact raw_artifacts = 20;
  string call_error = 21;
  string agent_name = 22;
  string agent_version = 23;
  optional int64 max_tokens = 24;
  optional double temperature = 25;
  optional double top_p = 26;
  optional string tool_choice = 27;
  optional bool thinking_enabled = 28;
  repeated string parent_generation_ids = 29;
  // Optional SDK-supplied catalog key. Must match `^sha256:[0-9a-f]{64}$`
  // when set; ingest rejects any other shape. Sigil falls back to a
  // server-computed sha256 of (system_prompt + sorted tools) when omitted.
  optional string effective_version = 30;
}

// --- Workflow Step ingest (separate schema from Generation) ---

service WorkflowStepIngestService {
  rpc ExportWorkflowSteps(ExportWorkflowStepsRequest)
      returns (ExportWorkflowStepsResponse);
}

message ExportWorkflowStepsRequest { repeated WorkflowStep workflow_steps = 1; }

message ExportWorkflowStepsResponse {
  repeated ExportWorkflowStepResult results = 1;
}

message ExportWorkflowStepResult {
  string step_id = 1;
  bool accepted = 2;
  string error = 3;
}

message WorkflowStep {
  string id = 1;
  string conversation_id = 2;
  string step_name = 3;
  string framework = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp completed_at = 6;
  google.protobuf.Struct input_state = 7;
  google.protobuf.Struct output_state = 8;
  string error = 9;
  map<string, string> tags = 10;
  repeated string linked_generation_ids = 11;
  repeated string parent_step_ids = 12;
  string agent_name = 13;
  string agent_version = 14;
  string trace_id = 15;
  string span_id = 16;
  google.protobuf.Struct metadata = 17;
}
