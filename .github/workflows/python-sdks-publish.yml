name: Publish Python SDKs to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver bump type (major / minor / patch)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: 'Preview only, do not publish, open a PR, or push tags'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    if: github.repository == 'grafana/sigil-sdk' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      new-version: ${{ steps.bump.outputs.new-version }}
      tag: ${{ steps.bump.outputs.tag }}

    steps:
      - name: Get secrets from Vault
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@f1614b210386ac420af6807a997ac7f6d96e477a # get-vault-secrets/v1.3.1
        env:
          VAULT_INSTANCE: ops
        with:
          vault_instance: ${{ env.VAULT_INSTANCE }}
          common_secrets: |
            GITHUB_APP_ID=plugins-platform-bot-app:app-id
            GITHUB_APP_PRIVATE_KEY=plugins-platform-bot-app:private-key
          export_env: false

      - name: Generate GitHub token
        id: generate-github-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ fromJSON(steps.get-secrets.outputs.secrets).GITHUB_APP_ID }}
          private-key: ${{ fromJSON(steps.get-secrets.outputs.secrets).GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-github-token.outputs.token }}
          persist-credentials: true

      - name: Setup Git
        run: |
          git config user.name 'grafana-plugins-platform-bot[bot]'
          git config user.email '144369747+grafana-plugins-platform-bot[bot]@users.noreply.github.com'

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Compute and apply version bump
        id: bump
        shell: bash
        env:
          BUMP: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          CURRENT=$(grep '^version = ' python/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          NEW=$(./.github/scripts/bump-version.sh "$BUMP" "$CURRENT")

          echo "new-version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=sdk-python/v${NEW}" >> "$GITHUB_OUTPUT"

          {
            echo "## Python SDK release plan"
            echo ""
            echo "- bump type: \`${BUMP}\`"
            echo "- current: \`${CURRENT}\`"
            echo "- new: \`${NEW}\`"
            echo "- tag: \`sdk-python/v${NEW}\`"
            echo "- dry-run: \`${DRY_RUN}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          PACKAGE_DIRS=(
            python
            python-providers/openai
            python-providers/anthropic
            python-providers/gemini
            python-frameworks/langchain
            python-frameworks/langgraph
            python-frameworks/openai-agents
            python-frameworks/llamaindex
            python-frameworks/google-adk
            python-frameworks/litellm
            python-frameworks/pydantic-ai
            python-frameworks/strands
          )

          for dir in "${PACKAGE_DIRS[@]}"; do
            file="${dir}/pyproject.toml"
            sed -i "s/^version = \".*\"/version = \"${NEW}\"/" "$file"
            if [[ "$dir" != "python" ]]; then
              sed -i "s/\"sigil-sdk>=.*\"/\"sigil-sdk>=${NEW}\"/" "$file"
            fi
            echo "  updated ${file}"
          done

      - name: Build all packages
        shell: bash
        run: |
          PACKAGE_DIRS=(
            python
            python-providers/openai
            python-providers/anthropic
            python-providers/gemini
            python-frameworks/langchain
            python-frameworks/langgraph
            python-frameworks/openai-agents
            python-frameworks/llamaindex
            python-frameworks/google-adk
            python-frameworks/litellm
            python-frameworks/pydantic-ai
            python-frameworks/strands
          )

          for dir in "${PACKAGE_DIRS[@]}"; do
            pkg_name=$(grep '^name = ' "${dir}/pyproject.toml" | head -1 | sed 's/name = "\(.*\)"/\1/')
            echo "Building ${pkg_name} from ${dir}..."
            python -m build "$dir" --outdir "dist/${pkg_name}"
          done

      - name: Upload built distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-sdk-dists
          path: dist/
          retention-days: 5

      - name: Open release PR and push tag
        if: ${{ !inputs.dry-run }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          GH_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          NEW_VERSION: ${{ steps.bump.outputs.new-version }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          BRANCH="release/sdk-python-${NEW_VERSION}"
          git checkout -b "${BRANCH}"
          git add \
            python/pyproject.toml \
            python-providers/*/pyproject.toml \
            python-frameworks/*/pyproject.toml
          git commit -m "chore(sdk-python): bump version to ${NEW_VERSION}"

          # Force-replace tag if it already exists (re-run safety).
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
          git tag -f -a "${TAG}" -m "Python SDK ${NEW_VERSION}"
          git push origin "${BRANCH}" --tags

          gh pr create \
            --title "chore(sdk-python): bump version to ${NEW_VERSION}" \
            --body "Auto-generated by the Python SDK publish workflow." \
            --base main \
            --head "${BRANCH}"

          gh pr merge "${BRANCH}" --auto --squash --delete-branch

  publish-core:
    if: ${{ !inputs.dry-run }}
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdk-dists
          path: dist/

      - name: Publish sigil-sdk to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/sigil-sdk/

  publish-dependents:
    if: ${{ !inputs.dry-run }}
    needs: [build, publish-core]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - sigil-sdk-openai
          - sigil-sdk-anthropic
          - sigil-sdk-gemini
          - sigil-sdk-langchain
          - sigil-sdk-langgraph
          - sigil-sdk-openai-agents
          - sigil-sdk-llamaindex
          - sigil-sdk-google-adk
          - sigil-sdk-litellm
          - sigil-sdk-pydantic-ai
          - sigil-sdk-strands

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdk-dists
          path: dist/

      - name: Publish ${{ matrix.package }} to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/${{ matrix.package }}/
