name: Publish plugins to npm

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Which plugin to publish"
        required: true
        type: choice
        options:
          - pi
          - opencode
          - all
      version:
        description: "Semver bump (applied to each selected plugin from its own current version)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: minor
      dry-run:
        description: 'Preview only, do not publish, open a PR, or push tags'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  prepare:
    if: github.repository == 'grafana/agento11y' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      plugins: ${{ steps.plan.outputs.plugins }}

    steps:
      - name: Generate GitHub token
        id: generate-github-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-plugins-platform-bot

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-github-token.outputs.token }}
          persist-credentials: true
          fetch-depth: 0  # changelog script needs full git history

      - name: Setup Git
        run: |
          git config user.name 'grafana-plugins-platform-bot[bot]'
          git config user.email '144369747+grafana-plugins-platform-bot[bot]@users.noreply.github.com'

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: true
          cache: true

      - run: pnpm install --frozen-lockfile

      - name: Resolve plugin list
        id: plan
        shell: bash
        run: |
          case "${{ inputs.plugin }}" in
            pi)       PLUGINS_JSON='["pi"]' ;;
            opencode) PLUGINS_JSON='["opencode"]' ;;
            all)      PLUGINS_JSON='["pi","opencode"]' ;;
          esac
          echo "plugins=${PLUGINS_JSON}" >> "$GITHUB_OUTPUT"

      - name: Bump, build, and pack each plugin
        shell: bash
        env:
          BUMP: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry-run }}
          PLUGINS_JSON: ${{ steps.plan.outputs.plugins }}
        run: |
          mkdir -p tarballs
          PLUGINS=$(echo "$PLUGINS_JSON" | jq -r '.[]')
          BUMP_SUMMARY=""
          for p in ${PLUGINS}; do
            echo "::group::Preparing plugins/${p}"
            (cd "plugins/${p}" && npm version "${BUMP}" --no-git-tag-version --package-lock=false --ignore-scripts)
            NEW=$(node -p "require('./plugins/${p}/package.json').version")
            NAME=$(node -p "require('./plugins/${p}/package.json').name")
            echo "Plugin ${p}: ${NAME}@${NEW}"

            # Generate the changelog and prepend it to the plugin's CHANGELOG.md
            # before packing, so the published tarball ships the new entry.
            # Stash the section in /tmp for the release PR body (same job, so the
            # working tree and /tmp persist into the next step).
            SECTION=$(./.github/scripts/changelog-for-release.sh "${NEW}" "plugins/${p}" "plugins/${p}")
            printf '%s\n' "$SECTION" > "/tmp/changelog-${p}.md"
            printf '%s\n' "$SECTION" | ./.github/scripts/prepend-changelog.sh "plugins/${p}/CHANGELOG.md"

            pnpm --filter "${NAME}" run build
            (cd "plugins/${p}" && pnpm --config.ignore-scripts=true pack --pack-destination "../../tarballs")

            # pnpm pack output is e.g. grafana-agento11y-pi-0.18.0.tgz; rename to <plugin>.tgz
            # so the matrix step doesn't need to know the version.
            for f in "tarballs/"*"${p}-"[0-9]*.tgz; do
              mv "$f" "tarballs/${p}.tgz"
              break
            done

            BUMP_SUMMARY="${BUMP_SUMMARY}- ${NAME}@${NEW}\n"
            echo "::endgroup::"
          done

          {
            echo "## Plugin release plan"
            echo ""
            echo "- bump type: \`${BUMP}\`"
            echo "- dry-run: \`${DRY_RUN}\`"
            echo ""
            echo "Versions:"
            printf "%b" "${BUMP_SUMMARY}"
            for p in ${PLUGINS}; do
              echo ""
              echo "### Changelog: plugins/${p}"
              echo ""
              cat "/tmp/changelog-${p}.md"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare release PR
        id: prep
        if: ${{ !inputs.dry-run }}
        shell: bash
        env:
          PLUGINS_JSON: ${{ steps.plan.outputs.plugins }}
        run: |
          PLUGINS=$(echo "$PLUGINS_JSON" | jq -r '.[]')
          BUMP_SUMMARY=""
          TAG_SPECS=""
          for p in ${PLUGINS}; do
            NAME=$(node -p "require('./plugins/${p}/package.json').name")
            NEW=$(node -p "require('./plugins/${p}/package.json').version")
            BUMP_SUMMARY="${BUMP_SUMMARY}- ${NAME}@${NEW}\n"
            # Stash plugin:version pairs so the tag step doesn't depend on the
            # working tree after the PR commit is created server-side.
            TAG_SPECS="${TAG_SPECS}${p}:${NEW} "
          done

          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "branch=release/plugins-${TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "tag-specs=${TAG_SPECS}" >> "$GITHUB_OUTPUT"

          {
            printf '## Plugin version bumps\n\n'
            printf '%b\n' "${BUMP_SUMMARY}"
            for p in ${PLUGINS}; do
              NAME=$(node -p "require('./plugins/${p}/package.json').name")
              printf '\n---\n\n**%s**\n\n' "${NAME}"
              cat "/tmp/changelog-${p}.md"
            done
            printf "\nGenerated by \`.github/workflows/plugins-publish.yml\`.\n"
          } > /tmp/pr-body.md

      - name: Open release PR
        id: cpr
        if: ${{ !inputs.dry-run }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-github-token.outputs.token }}
          branch: ${{ steps.prep.outputs.branch }}
          base: main
          sign-commits: true
          add-paths: |
            plugins/*/package.json
            plugins/*/CHANGELOG.md
          commit-message: "chore(plugins): bump versions (${{ inputs.version }})"
          title: "chore(plugins): bump versions (${{ inputs.version }})"
          body-path: /tmp/pr-body.md

      - name: Tag releases and enable auto-merge
        if: ${{ !inputs.dry-run }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          GH_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          TAG_SPECS: ${{ steps.prep.outputs.tag-specs }}
          HEAD_SHA: ${{ steps.cpr.outputs.pull-request-head-sha }}
          BRANCH: ${{ steps.cpr.outputs.pull-request-branch }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin "${BRANCH}"

          for spec in ${TAG_SPECS}; do
            p="${spec%%:*}"
            NEW="${spec#*:}"
            # Force-replace tag if it already exists (re-run safety)
            git push origin ":refs/tags/plugins/${p}/v${NEW}" 2>/dev/null || true
            git tag -f -a "plugins/${p}/v${NEW}" -m "Plugin ${p} ${NEW}" "${HEAD_SHA}"
            git push origin "refs/tags/plugins/${p}/v${NEW}"
          done

          gh pr merge "${BRANCH}" --auto --squash --delete-branch

      - name: Upload plugin tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plugin-tarballs
          path: tarballs/
          retention-days: 5

  publish:
    if: ${{ !inputs.dry-run }}
    needs: prepare
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJSON(needs.prepare.outputs.plugins) }}

    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Download plugin tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: plugin-tarballs
          path: tarballs/

      - name: Publish ${{ matrix.plugin }} to npm
        env:
          PLUGIN: ${{ matrix.plugin }}
        # --provenance attaches SLSA build provenance via OIDC (id-token: write).
        run: npm publish "./tarballs/${PLUGIN}.tgz" --access public --ignore-scripts --provenance
