name: Publish JS SDK to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver bump type (major / minor / patch)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: 'Preview only, do not publish, open a PR, or push tags'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    if: github.repository == 'grafana/sigil-sdk' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      new-version: ${{ steps.bump.outputs.new-version }}
      tag: ${{ steps.bump.outputs.tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Bump version
        id: bump
        shell: bash
        env:
          BUMP: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          CURRENT=$(node -p "require('./js/package.json').version")
          CORE_CURRENT=$(node -p "require('./js-core/package.json').version")
          (cd js && npm version "$BUMP" --no-git-tag-version --package-lock=false --ignore-scripts >/dev/null)
          NEW=$(node -p "require('./js/package.json').version")
          (cd js-core && npm version "$NEW" --no-git-tag-version --allow-same-version --package-lock=false --ignore-scripts >/dev/null)

          echo "new-version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=sdk-js/v${NEW}" >> "$GITHUB_OUTPUT"

          {
            echo "## JS SDK release plan"
            echo ""
            echo "- bump type: \`${BUMP}\`"
            echo "- current: \`${CURRENT}\`"
            echo "- core current: \`${CORE_CURRENT}\`"
            echo "- new: \`${NEW}\`"
            echo "- tag: \`sdk-js/v${NEW}\`"
            echo "- dry-run: \`${DRY_RUN}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        run: pnpm --filter @grafana/agento11y run build

      - name: Pack tarball
        run: |
          mkdir -p tarballs
          # The [0-9] glob keeps the main-package pattern from also matching
          # the core tarball (grafana-agento11y-core-*.tgz).
          (cd js && pnpm --config.ignore-scripts=true pack --pack-destination ../tarballs)
          mv tarballs/grafana-agento11y-[0-9]*.tgz tarballs/sdk-js.tgz
          (cd js-core && pnpm --config.ignore-scripts=true pack --pack-destination ../tarballs)
          mv tarballs/grafana-agento11y-core-*.tgz tarballs/sdk-js-core.tgz

      - name: Upload tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdk-js-tarball
          path: tarballs/
          retention-days: 5

  publish:
    if: ${{ !inputs.dry-run }}
    needs: build
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - name: Install npm with Trusted Publishing support
        run: npm install -g npm@^11.5.1 --ignore-scripts

      - name: Download tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sdk-js-tarball
          path: tarballs/

      - name: Publish to npm
        run: |
          # Preflight both tarballs first so a registry/auth error on the new
          # core package is caught before the full SDK version is burned.
          # --provenance attaches SLSA build provenance via OIDC (id-token: write).
          npm publish ./tarballs/sdk-js-core.tgz --access public --ignore-scripts --provenance --dry-run
          npm publish ./tarballs/sdk-js.tgz --access public --ignore-scripts --provenance --dry-run

          # Publish the new (less-proven) package first. If it fails the run
          # can be retried without leaving an orphan @grafana/agento11y
          # release on npm.
          npm publish ./tarballs/sdk-js-core.tgz --access public --ignore-scripts --provenance
          npm publish ./tarballs/sdk-js.tgz --access public --ignore-scripts --provenance

  tag:
    if: ${{ !inputs.dry-run }}
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Generate GitHub token
        id: generate-github-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-plugins-platform-bot

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-github-token.outputs.token }}
          persist-credentials: true

      - name: Setup Git
        run: |
          git config user.name 'grafana-plugins-platform-bot[bot]'
          git config user.email '144369747+grafana-plugins-platform-bot[bot]@users.noreply.github.com'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Bump package versions
        shell: bash
        env:
          NEW_VERSION: ${{ needs.build.outputs.new-version }}
        run: |
          (cd js && npm version "${NEW_VERSION}" --no-git-tag-version --allow-same-version --package-lock=false --ignore-scripts >/dev/null)
          (cd js-core && npm version "${NEW_VERSION}" --no-git-tag-version --allow-same-version --package-lock=false --ignore-scripts >/dev/null)

      - name: Open release PR
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-github-token.outputs.token }}
          branch: release/sdk-js-${{ needs.build.outputs.new-version }}
          base: main
          sign-commits: true
          add-paths: |
            js/package.json
            js-core/package.json
          commit-message: "chore(sdk-js): bump version to ${{ needs.build.outputs.new-version }}"
          title: "chore(sdk-js): bump version to ${{ needs.build.outputs.new-version }}"
          body: "Auto-generated by the JS SDK publish workflow."

      - name: Tag release and enable auto-merge
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          GH_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          NEW_VERSION: ${{ needs.build.outputs.new-version }}
          TAG: ${{ needs.build.outputs.tag }}
          HEAD_SHA: ${{ steps.cpr.outputs.pull-request-head-sha }}
          BRANCH: ${{ steps.cpr.outputs.pull-request-branch }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin "${BRANCH}"

          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
          git tag -f -a "${TAG}" -m "JS SDK ${NEW_VERSION}" "${HEAD_SHA}"
          git push origin "refs/tags/${TAG}"

          gh pr merge "${BRANCH}" --auto --squash --delete-branch
