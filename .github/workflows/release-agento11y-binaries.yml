name: Release plugins/agento11y binaries

on:
  push:
    tags:
      - "plugins/agento11y/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing plugins/agento11y/v* tag to (re-)release."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-agento11y-binaries-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'grafana/sigil-sdk'
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create the GitHub Release and upload assets

    steps:
      - name: Resolve tag and version
        id: ver
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          # Manual runs must pass an explicit tag; only tag-triggered
          # pushes can derive it from GITHUB_REF.
          if [[ -n "$INPUT_TAG" ]]; then
            TAG="$INPUT_TAG"
          elif [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            echo "::error::Input 'tag' is required when dispatching this workflow manually."
            exit 1
          fi
          case "$TAG" in
            plugins/agento11y/v*) ;;
            *)
              echo "::error::Refusing to release '$TAG'; expected a plugins/agento11y/v* tag."
              exit 1
              ;;
          esac
          # VERSION carries the leading `v` (e.g. v0.9.0). GoReleaser strips
          # that to produce {{ .Version }} = 0.9.0.
          VERSION="${TAG#plugins/agento11y/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Checkout the tagged commit. workflow_dispatch passes a tag in
          # `inputs.tag`; the push event already points at the tag ref.
          ref: ${{ steps.ver.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: plugins/agento11y/go.mod
          cache: false

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          # Grab the top `## [x.y.z]` section. The awk program prints every
          # line while inside the first section and exits at the next one.
          notes=$(awk '/^## \[/{n++} n==1{print} n==2{exit}' plugins/agento11y/CHANGELOG.md)
          if [[ -z "$notes" ]]; then
            echo "::error::No '## [x.y.z]' section found in plugins/agento11y/CHANGELOG.md"
            exit 1
          fi
          delim="$(openssl rand -hex 16)"
          {
            echo "RELEASE_NOTES<<${delim}"
            printf '%s\n' "$notes"
            echo "${delim}"
          } >> "$GITHUB_ENV"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          # `--skip=validate` is required because GORELEASER_CURRENT_TAG
          # overrides the tag with the prefix-stripped version (e.g.
          # v0.11.0), which is not a real git tag. Without it goreleaser's
          # git-state check fails with "git tag v0.11.0 was not made against
          # commit ...". The monorepo block that would handle the real
          # plugins/agento11y/v* tag natively is goreleaser Pro only.
          args: release --clean --skip=validate -f plugins/agento11y/.goreleaser.yaml
        env:
          # GORELEASER_CURRENT_TAG feeds {{ .Version }} (prefix and leading
          # `v` stripped). `release.disable: true` in the config skips
          # goreleaser's GitHub Release step; the dedicated step below
          # creates the release.
          GORELEASER_CURRENT_TAG: ${{ steps.ver.outputs.version }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
          NOTES: ${{ env.RELEASE_NOTES }}
        run: |
          set -euo pipefail
          # {{ .Version }} in the goreleaser config drops the leading `v`,
          # so the archive names use the bare semver.
          BARE_VERSION="${VERSION#v}"
          # Windows archives are .zip (format_overrides in the goreleaser
          # config); everything else is tar.gz.
          assets=(
            "dist/agento11y_${BARE_VERSION}_linux_amd64.tar.gz"
            "dist/agento11y_${BARE_VERSION}_linux_arm64.tar.gz"
            "dist/agento11y_${BARE_VERSION}_darwin_amd64.tar.gz"
            "dist/agento11y_${BARE_VERSION}_darwin_arm64.tar.gz"
            "dist/agento11y_${BARE_VERSION}_windows_amd64.zip"
            "dist/agento11y_${BARE_VERSION}_windows_arm64.zip"
            "dist/agento11y_${BARE_VERSION}_checksums.txt"
          )
          for asset in "${assets[@]}"; do
            if [[ ! -f "$asset" ]]; then
              echo "::error::Expected asset is missing: $asset"
              exit 1
            fi
          done

          if gh release view "$TAG" >/dev/null 2>&1; then
            # Re-release: refresh notes and overwrite existing assets.
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes "$NOTES"
            gh release upload "$TAG" --clobber "${assets[@]}"
          else
            # --verify-tag makes gh check the tag exists on the remote
            # before creating the release; the release is automatically
            # pinned to the commit the tag points at.
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$NOTES" \
              --verify-tag \
              "${assets[@]}"
          fi
