name: Publish Python SDKs to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver bump type (major / minor / patch)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

jobs:
  build:
    if: github.repository == 'grafana/sigil-sdk' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      new-version: ${{ steps.bump.outputs.new-version }}

    steps:
      - name: Get secrets from Vault
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@f1614b210386ac420af6807a997ac7f6d96e477a # get-vault-secrets/v1.3.1
        env:
          VAULT_INSTANCE: ops
        with:
          vault_instance: ${{ env.VAULT_INSTANCE }}
          common_secrets: |
            GITHUB_APP_ID=plugins-platform-bot-app:app-id
            GITHUB_APP_PRIVATE_KEY=plugins-platform-bot-app:private-key
          export_env: false

      - name: Generate GitHub token
        id: generate-github-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ fromJSON(steps.get-secrets.outputs.secrets).GITHUB_APP_ID }}
          private-key: ${{ fromJSON(steps.get-secrets.outputs.secrets).GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-github-token.outputs.token }}
          persist-credentials: true

      - name: Setup Git
        run: |
          git config user.name 'grafana-plugins-platform-bot[bot]'
          git config user.email '144369747+grafana-plugins-platform-bot[bot]@users.noreply.github.com'

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Compute and apply version bump
        id: bump
        shell: bash
        run: |
          CURRENT=$(grep '^version = ' python/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.version }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "new-version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "Bumping Python SDK versions: ${CURRENT} -> ${NEW}"

          PACKAGE_DIRS=(
            python
            python-providers/openai
            python-providers/anthropic
            python-providers/gemini
            python-frameworks/langchain
            python-frameworks/langgraph
            python-frameworks/openai-agents
            python-frameworks/llamaindex
            python-frameworks/google-adk
            python-frameworks/litellm
            python-frameworks/pydantic-ai
            python-frameworks/strands
          )

          for dir in "${PACKAGE_DIRS[@]}"; do
            file="${dir}/pyproject.toml"
            sed -i "s/^version = \".*\"/version = \"${NEW}\"/" "$file"
            if [[ "$dir" != "python" ]]; then
              sed -i "s/\"sigil-sdk>=.*\"/\"sigil-sdk>=${NEW}\"/" "$file"
            fi
            echo "  updated ${file}"
          done

      - name: Build all packages
        shell: bash
        run: |
          PACKAGE_DIRS=(
            python
            python-providers/openai
            python-providers/anthropic
            python-providers/gemini
            python-frameworks/langchain
            python-frameworks/langgraph
            python-frameworks/openai-agents
            python-frameworks/llamaindex
            python-frameworks/google-adk
            python-frameworks/litellm
            python-frameworks/pydantic-ai
            python-frameworks/strands
          )

          for dir in "${PACKAGE_DIRS[@]}"; do
            pkg_name=$(grep '^name = ' "${dir}/pyproject.toml" | head -1 | sed 's/name = "\(.*\)"/\1/')
            echo "Building ${pkg_name} from ${dir}..."
            python -m build "$dir" --outdir "dist/${pkg_name}"
          done

      - name: Commit and push
        shell: bash
        run: |
          # Configure git to use the GitHub App token
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          
          git add \
            python/pyproject.toml \
            python-providers/*/pyproject.toml \
            python-frameworks/*/pyproject.toml
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit, version may already be bumped"
          else
            git commit -m "chore(sdk-python): bump version to ${NEW_VERSION}"
          fi
          
          # Delete existing tag if present (handles re-runs)
          git push origin :refs/tags/sdk-python/v${NEW_VERSION} 2>/dev/null || true
          git tag -f -a "sdk-python/v${NEW_VERSION}" -m "Python SDK ${NEW_VERSION}"
          
          git push origin HEAD --tags
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new-version }}
          GITHUB_TOKEN: ${{ steps.generate-github-token.outputs.token }}

      - name: Upload built distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-sdk-dists
          path: dist/
          retention-days: 5

  publish-core:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdk-dists
          path: dist/

      - name: Publish sigil-sdk to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/sigil-sdk/

  publish-dependents:
    needs: [build, publish-core]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - sigil-sdk-openai
          - sigil-sdk-anthropic
          - sigil-sdk-gemini
          - sigil-sdk-langchain
          - sigil-sdk-langgraph
          - sigil-sdk-openai-agents
          - sigil-sdk-llamaindex
          - sigil-sdk-google-adk
          - sigil-sdk-litellm
          - sigil-sdk-pydantic-ai
          - sigil-sdk-strands

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdk-dists
          path: dist/

      - name: Publish ${{ matrix.package }} to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/${{ matrix.package }}/
