name: Publish plugins to npm

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Which plugin to publish"
        required: true
        type: choice
        options:
          - pi
          - opencode
          - all
      version:
        description: "Semver bump (applied to each selected plugin from its own current version)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: 'Preview only, do not publish, open a PR, or push tags'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  prepare:
    if: github.repository == 'grafana/sigil-sdk' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      plugins: ${{ steps.plan.outputs.plugins }}

    steps:
      - name: Get secrets from Vault
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@f1614b210386ac420af6807a997ac7f6d96e477a # get-vault-secrets/v1.3.1
        env:
          VAULT_INSTANCE: ops
        with:
          vault_instance: ${{ env.VAULT_INSTANCE }}
          common_secrets: |
            GITHUB_APP_ID=plugins-platform-bot-app:app-id
            GITHUB_APP_PRIVATE_KEY=plugins-platform-bot-app:private-key
          export_env: false

      - name: Generate GitHub token
        id: generate-github-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ fromJSON(steps.get-secrets.outputs.secrets).GITHUB_APP_ID }}
          private-key: ${{ fromJSON(steps.get-secrets.outputs.secrets).GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-github-token.outputs.token }}
          persist-credentials: true

      - name: Setup Git
        run: |
          git config user.name 'grafana-plugins-platform-bot[bot]'
          git config user.email '144369747+grafana-plugins-platform-bot[bot]@users.noreply.github.com'

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: js/package.json
          cache: pnpm

      - run: pnpm install

      - name: Resolve plugin list
        id: plan
        shell: bash
        run: |
          case "${{ inputs.plugin }}" in
            pi)       PLUGINS_JSON='["pi"]' ;;
            opencode) PLUGINS_JSON='["opencode"]' ;;
            all)      PLUGINS_JSON='["pi","opencode"]' ;;
          esac
          echo "plugins=${PLUGINS_JSON}" >> "$GITHUB_OUTPUT"

      - name: Bump, build, and pack each plugin
        shell: bash
        env:
          BUMP: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry-run }}
          PLUGINS_JSON: ${{ steps.plan.outputs.plugins }}
        run: |
          mkdir -p tarballs
          PLUGINS=$(echo "$PLUGINS_JSON" | jq -r '.[]')
          BUMP_SUMMARY=""
          for p in ${PLUGINS}; do
            echo "::group::Preparing plugins/${p}"
            (cd "plugins/${p}" && npm version "${BUMP}" --no-git-tag-version)
            NEW=$(node -p "require('./plugins/${p}/package.json').version")
            NAME=$(node -p "require('./plugins/${p}/package.json').name")
            echo "Plugin ${p}: ${NAME}@${NEW}"

            pnpm --filter "${NAME}" run build
            (cd "plugins/${p}" && pnpm pack --pack-destination "../../tarballs")

            # pnpm pack output is e.g. grafana-sigil-pi-0.1.1.tgz; rename to <plugin>.tgz
            # so the matrix step doesn't need to know the version.
            for f in "tarballs/"*"${p}-"[0-9]*.tgz; do
              mv "$f" "tarballs/${p}.tgz"
              break
            done

            BUMP_SUMMARY="${BUMP_SUMMARY}- ${NAME}@${NEW}\n"
            echo "::endgroup::"
          done

          {
            echo "## Plugin release plan"
            echo ""
            echo "- bump type: \`${BUMP}\`"
            echo "- dry-run: \`${DRY_RUN}\`"
            echo ""
            echo "Versions:"
            printf "%b" "${BUMP_SUMMARY}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open release PR and push tags
        if: ${{ !inputs.dry-run }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          GH_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          BUMP: ${{ inputs.version }}
          PLUGINS_JSON: ${{ steps.plan.outputs.plugins }}
          REPO: ${{ github.repository }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"

          PLUGINS=$(echo "$PLUGINS_JSON" | jq -r '.[]')
          BUMP_SUMMARY=""
          for p in ${PLUGINS}; do
            NAME=$(node -p "require('./plugins/${p}/package.json').name")
            NEW=$(node -p "require('./plugins/${p}/package.json').version")
            git add "plugins/${p}/package.json"
            BUMP_SUMMARY="${BUMP_SUMMARY}- ${NAME}@${NEW}\n"
          done

          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          BRANCH="release/plugins-${TIMESTAMP}"
          git checkout -b "${BRANCH}"
          git commit -m "chore(plugins): bump versions (${BUMP})"

          for p in ${PLUGINS}; do
            NEW=$(node -p "require('./plugins/${p}/package.json').version")
            # Force-replace tag if it already exists (re-run safety)
            git push origin ":refs/tags/plugins/${p}/v${NEW}" 2>/dev/null || true
            git tag -f -a "plugins/${p}/v${NEW}" -m "Plugin ${p} ${NEW}"
          done
          git push origin "${BRANCH}" --tags

          PR_BODY=$(printf "## Plugin Version Bumps\n\n%b\n\nAuto-generated by the plugin publish workflow." "${BUMP_SUMMARY}")
          gh pr create \
            --title "chore(plugins): bump versions (${BUMP})" \
            --body "${PR_BODY}" \
            --base main \
            --head "${BRANCH}"

          gh pr merge "${BRANCH}" --auto --squash --delete-branch

      - name: Upload plugin tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plugin-tarballs
          path: tarballs/
          retention-days: 5

  publish:
    if: ${{ !inputs.dry-run }}
    needs: prepare
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJSON(needs.prepare.outputs.plugins) }}

    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Download plugin tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: plugin-tarballs
          path: tarballs/

      - name: Publish ${{ matrix.plugin }} to npm
        env:
          PLUGIN: ${{ matrix.plugin }}
        run: npm publish "./tarballs/${PLUGIN}.tgz" --access public
