packages:
  - 'js'
  - 'js-core'
  - 'plugins/*'

overrides:
  protobufjs: 7.6.1
  lodash: 4.18.1
  lodash-es: 4.18.1
  '@mikro-orm/knex': 6.6.14
  fast-uri: 3.1.2
  hono: 4.12.23
  tar: 7.5.15
  ws: 8.21.0
  '@tootallnate/once': 2.0.1

# Security Hardening Week package-manager policy.
minimumReleaseAge: 4320
trustPolicy: no-downgrade
blockExoticSubdeps: true
strictDepBuilds: true
allowBuilds:
  esbuild: true
  koffi: true
  protobufjs: true
  sqlite3: true
  tree-sitter: true
