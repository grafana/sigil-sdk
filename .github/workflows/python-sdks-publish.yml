name: Publish Python SDKs to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver bump type (major / minor / patch)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: minor
      dry-run:
        description: 'Preview only, do not publish, open a PR, or push tags'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    if: github.repository == 'grafana/agento11y' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      new-version: ${{ steps.bump.outputs.new-version }}
      tag: ${{ steps.bump.outputs.tag }}

    steps:
      - name: Generate GitHub token
        id: generate-github-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-plugins-platform-bot

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-github-token.outputs.token }}
          persist-credentials: true

      - name: Setup Git
        run: |
          git config user.name 'grafana-plugins-platform-bot[bot]'
          git config user.email '144369747+grafana-plugins-platform-bot[bot]@users.noreply.github.com'

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Compute and apply version bump
        id: bump
        shell: bash
        env:
          BUMP: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          CURRENT=$(grep '^version = ' python/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          NEW=$(./.github/scripts/bump-version.sh "$BUMP" "$CURRENT")

          echo "new-version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=sdk-python/v${NEW}" >> "$GITHUB_OUTPUT"

          {
            echo "## Python SDK release plan"
            echo ""
            echo "- bump type: \`${BUMP}\`"
            echo "- current: \`${CURRENT}\`"
            echo "- new: \`${NEW}\`"
            echo "- tag: \`sdk-python/v${NEW}\`"
            echo "- dry-run: \`${DRY_RUN}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          PACKAGE_DIRS=(
            python
            python-providers/openai
            python-providers/anthropic
            python-providers/gemini
            python-frameworks/langchain
            python-frameworks/langgraph
            python-frameworks/openai-agents
            python-frameworks/llamaindex
            python-frameworks/google-adk
            python-frameworks/litellm
            python-frameworks/pydantic-ai
            python-frameworks/strands
            python-frameworks/claude-agent-sdk
          )

          for dir in "${PACKAGE_DIRS[@]}"; do
            file="${dir}/pyproject.toml"
            sed -i "s/^version = \".*\"/version = \"${NEW}\"/" "$file"
            if [[ "$dir" != "python" ]]; then
              sed -i "s/\"agento11y>=.*\"/\"agento11y>=${NEW}\"/" "$file"
            fi
            echo "  updated ${file}"
          done

      - name: Build all packages
        shell: bash
        run: |
          PACKAGE_DIRS=(
            python
            python-providers/openai
            python-providers/anthropic
            python-providers/gemini
            python-frameworks/langchain
            python-frameworks/langgraph
            python-frameworks/openai-agents
            python-frameworks/llamaindex
            python-frameworks/google-adk
            python-frameworks/litellm
            python-frameworks/pydantic-ai
            python-frameworks/strands
            python-frameworks/claude-agent-sdk
          )

          for dir in "${PACKAGE_DIRS[@]}"; do
            pkg_name=$(grep '^name = ' "${dir}/pyproject.toml" | head -1 | sed 's/name = "\(.*\)"/\1/')
            echo "Building ${pkg_name} from ${dir}..."
            python -m build "$dir" --outdir "dist/${pkg_name}"
          done

      - name: Upload built distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-sdk-dists
          path: dist/
          retention-days: 5

      - name: Open release PR
        id: cpr
        if: ${{ !inputs.dry-run }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-github-token.outputs.token }}
          branch: release/sdk-python-${{ steps.bump.outputs.new-version }}
          base: main
          sign-commits: true
          add-paths: |
            python/pyproject.toml
            python-providers/*/pyproject.toml
            python-frameworks/*/pyproject.toml
          commit-message: "chore(sdk-python): bump version to ${{ steps.bump.outputs.new-version }}"
          title: "chore(sdk-python): bump version to ${{ steps.bump.outputs.new-version }}"
          body: "Auto-generated by the Python SDK publish workflow."

      - name: Tag release and enable auto-merge
        if: ${{ !inputs.dry-run }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          GH_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          NEW_VERSION: ${{ steps.bump.outputs.new-version }}
          TAG: ${{ steps.bump.outputs.tag }}
          HEAD_SHA: ${{ steps.cpr.outputs.pull-request-head-sha }}
          BRANCH: ${{ steps.cpr.outputs.pull-request-branch }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin "${BRANCH}"

          # Force-replace tag if it already exists (re-run safety).
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
          git tag -f -a "${TAG}" -m "Python SDK ${NEW_VERSION}" "${HEAD_SHA}"
          git push origin "refs/tags/${TAG}"

          gh pr merge "${BRANCH}" --auto --squash --delete-branch

  publish-core:
    if: ${{ !inputs.dry-run }}
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdk-dists
          path: dist/

      - name: Publish agento11y to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/agento11y/
          # PEP 740 attestations via OIDC (id-token: write). Default since
          # v1.11.0; pin it explicitly so future action upgrades that flip the
          # default would surface as a workflow change instead of a silent
          # regression.
          attestations: true

  publish-dependents:
    if: ${{ !inputs.dry-run }}
    needs: [build, publish-core]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - agento11y-openai
          - agento11y-anthropic
          - agento11y-gemini
          - agento11y-langchain
          - agento11y-langgraph
          - agento11y-openai-agents
          - agento11y-llamaindex
          - agento11y-google-adk
          - agento11y-litellm
          - agento11y-pydantic-ai
          - agento11y-strands
          - agento11y-claude-agent-sdk

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdk-dists
          path: dist/

      - name: Publish ${{ matrix.package }} to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/${{ matrix.package }}/
          attestations: true
