name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  scripts:
    name: Workflow scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Test bump-version.sh
        run: ./.github/scripts/bump-version.test.sh

  go:
    name: Go SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go/go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          args: --timeout=5m
          working-directory: go

      - name: Test core
        run: cd go && GOWORK=off go test ./...

      - name: Test anthropic provider
        run: cd go-providers/anthropic && GOWORK=off go test ./...

      - name: Test openai provider
        run: cd go-providers/openai && GOWORK=off go test ./...

      - name: Test gemini provider
        run: cd go-providers/gemini && GOWORK=off go test ./...

      - name: Test google-adk framework
        run: cd go-frameworks/google-adk && GOWORK=off go test ./...

      - name: Test cursor plugin
        run: cd plugins/cursor && GOWORK=off go test ./...

  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: true
          install_args: biome
          cache: true

      - run: pnpm install

      - name: Lint
        run: mise run lint:ts:sdk-js

      - name: Typecheck
        run: pnpm --filter @grafana/sigil-sdk-js run typecheck

      - name: Test
        run: pnpm --filter @grafana/sigil-sdk-js run test:ci

      - name: Lint pi plugin
        run: mise run lint:ts:plugin-pi

      - name: Typecheck pi plugin
        run: pnpm --filter @grafana/sigil-pi run typecheck

      - name: Test pi plugin
        run: pnpm --filter @grafana/sigil-pi run test

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: true
          install_args: ruff
          cache: true

      - name: ruff check
        run: mise run lint:py

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - { name: core, cmd: "uv run --with '.[dev]' --directory python pytest tests" }
          - { name: openai, cmd: "uv run --with './python[dev]' --with './python-providers/openai[dev]' pytest python-providers/openai/tests" }
          - { name: anthropic, cmd: "uv run --with './python[dev]' --with './python-providers/anthropic[dev]' pytest python-providers/anthropic/tests" }
          - { name: gemini, cmd: "uv run --with './python[dev]' --with './python-providers/gemini[dev]' pytest python-providers/gemini/tests" }
          - { name: langchain, cmd: "uv run --with './python[dev]' --with './python-frameworks/langchain[dev]' pytest python-frameworks/langchain/tests" }
          - { name: langgraph, cmd: "uv run --with './python[dev]' --with './python-frameworks/langgraph[dev]' pytest python-frameworks/langgraph/tests" }
          - { name: openai-agents, cmd: "uv run --with './python[dev]' --with './python-frameworks/openai-agents[dev]' pytest python-frameworks/openai-agents/tests" }
          - { name: llamaindex, cmd: "uv run --with './python[dev]' --with './python-frameworks/llamaindex[dev]' pytest python-frameworks/llamaindex/tests" }
          - { name: google-adk, cmd: "uv run --with './python[dev]' --with './python-frameworks/google-adk[dev]' pytest python-frameworks/google-adk/tests" }
          - { name: litellm, cmd: "uv run --with './python[dev]' --with './python-frameworks/litellm[dev]' pytest python-frameworks/litellm/tests" }
          - { name: pydantic-ai, cmd: "uv run --with './python[dev]' --with './python-frameworks/pydantic-ai[dev]' pytest python-frameworks/pydantic-ai/tests" }
          - { name: strands, cmd: "uv run --with './python[dev]' --with './python-frameworks/strands[dev]' pytest python-frameworks/strands/tests" }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Test ${{ matrix.suite.name }}
        run: ${{ matrix.suite.cmd }}

  dotnet:
    name: .NET SDK
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
      DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
      FORCE_COLOR: 3
      NUGET_XMLDOC_MODE: skip
      TERM: xterm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          global-json-file: dotnet/global.json

      - name: Restore
        run: dotnet restore dotnet/Sigil.DotNet.slnx

      - name: Format check
        run: dotnet format dotnet/Sigil.DotNet.slnx --verify-no-changes --no-restore

      - name: Test
        run: dotnet test dotnet/Sigil.DotNet.slnx -c Release

      - name: Pack
        run: dotnet pack dotnet/Sigil.DotNet.slnx -c Release

      - name: Publish packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dotnet-packages
          path: ./dotnet/artifacts/package/release
          retention-days: 5

  java:
    name: Java SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Test
        working-directory: java
        run: ./gradlew --no-daemon test
