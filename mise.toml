# --- Python version bump ---

[tasks."sdk:py:bump"]
description = "Bump version across all 9 Python SDK pyproject.toml files"
run = '''
#!/usr/bin/env bash
set -euo pipefail

VERSION="${1:?Usage: mise run sdk:py:bump <VERSION>}"
if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
  echo "Error: version must be in MAJOR.MINOR.PATCH format (got: $VERSION)" >&2
  exit 1
fi

PACKAGE_DIRS=(
  python
  python-providers/openai
  python-providers/anthropic
  python-providers/gemini
  python-frameworks/langchain
  python-frameworks/langgraph
  python-frameworks/openai-agents
  python-frameworks/llamaindex
  python-frameworks/google-adk
  python-frameworks/litellm
)

for dir in "${PACKAGE_DIRS[@]}"; do
  file="${dir}/pyproject.toml"
  perl -i -pe "s/^version = \".*\"/version = \"${VERSION}\"/" "$file"
  if [[ "$dir" != "python" ]]; then
    perl -i -pe "s/\"sigil-sdk>=.*\"/\"sigil-sdk>=${VERSION}\"/" "$file"
  fi
  echo "  updated ${file}"
done

echo "All Python SDK versions bumped to ${VERSION}"
'''

# --- Proto generation ---

[tasks."generate:proto:go"]
description = "Regenerate Go protobuf stubs from proto/sigil/v1/*.proto"
run = "bash go/scripts/generate_proto.sh"

[tasks."generate:proto:python"]
description = "Regenerate Python protobuf stubs from proto/sigil/v1/*.proto"
run = "bash python/scripts/generate_proto.sh"

[tasks."generate:proto:js"]
description = "Sync proto/sigil/v1/*.proto into js/proto for the JS SDK"
depends = ["deps"]
run = "pnpm --filter @grafana/sigil-sdk-js run sync-proto"

[tasks."generate:proto"]
description = "Regenerate protobuf stubs for all SDKs"
depends = ["generate:proto:go", "generate:proto:python", "generate:proto:js"]

