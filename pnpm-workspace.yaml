packages:
  - 'js'
  - 'js-core'
  - 'plugins/*'

# Pinned transitive dependencies. pnpm reads overrides from this file, not the
# `pnpm.overrides` field in package.json, when a workspace file is present.
overrides:
  protobufjs: 7.6.1
  lodash: 4.18.1
  lodash-es: 4.18.1
  '@mikro-orm/knex': 6.6.14
  fast-uri: 3.1.2
  hono: 4.12.23
  tar: 7.5.15
  ws: 8.21.0
  '@tootallnate/once': 2.0.1

# Security Hardening Week package-manager policy.
minimumReleaseAge: 4320
trustPolicy: no-downgrade
trustPolicyExclude:
  # Transitive of @mariozechner/pi-coding-agent@0.70.5; reviewed during pnpm 11 migration.
  - '@mariozechner/clipboard@0.3.3'
  - '@mariozechner/clipboard-darwin-arm64@0.3.3'
  - '@mariozechner/clipboard-darwin-universal@0.3.3'
  - '@mariozechner/clipboard-darwin-x64@0.3.3'
  - '@mariozechner/clipboard-linux-arm64-gnu@0.3.3'
  - '@mariozechner/clipboard-linux-arm64-musl@0.3.3'
  - '@mariozechner/clipboard-linux-riscv64-gnu@0.3.3'
  - '@mariozechner/clipboard-linux-x64-gnu@0.3.3'
  - '@mariozechner/clipboard-linux-x64-musl@0.3.3'
  - '@mariozechner/clipboard-win32-arm64-msvc@0.3.3'
  - '@mariozechner/clipboard-win32-x64-msvc@0.3.3'
blockExoticSubdeps: true
strictDepBuilds: true
allowBuilds:
  esbuild: true
  koffi: true
  protobufjs: true
  sqlite3: true
  tree-sitter: true
minimumReleaseAgeExclude:
  # Renovate security update: @anthropic-ai/sdk@0.91.1
  - "@anthropic-ai/sdk@0.91.1"
