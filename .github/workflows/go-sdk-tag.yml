name: Tag Go SDK modules

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver bump type (major / minor / patch)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: minor
      dry-run:
        description: 'Preview only, do not create or push tags'
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  tag:
    if: github.repository == 'grafana/agento11y' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Generate GitHub token
        id: generate-github-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-plugins-platform-bot

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-github-token.outputs.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name 'grafana-plugins-platform-bot[bot]'
          git config user.email '144369747+grafana-plugins-platform-bot[bot]@users.noreply.github.com'

      - name: Compute next version and tag all Go modules
        shell: bash
        env:
          BUMP: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          MODULES=(
            go
            go-providers/anthropic
            go-providers/openai
            go-providers/gemini
            go-frameworks/google-adk
          )

          # Source of truth for "current" = latest tag on the core `go` module.
          # All modules are released in lockstep, so this drives the next bump.
          CURRENT=$(git tag -l 'go/v*' | sed 's|go/v||' | sort -V | tail -1)
          CURRENT=${CURRENT:-0.0.0}

          NEW=$(./.github/scripts/bump-version.sh "$BUMP" "$CURRENT")
          VERSION="v${NEW}"

          {
            echo "## Go SDK release plan"
            echo ""
            echo "- bump type: \`${BUMP}\`"
            echo "- current: \`v${CURRENT}\`"
            echo "- new: \`${VERSION}\`"
            echo "- dry-run: \`${DRY_RUN}\`"
            echo ""
            echo "Tags to create:"
            for mod in "${MODULES[@]}"; do echo "- \`${mod}/${VERSION}\`"; done
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Bumping Go SDK modules: ${CURRENT} -> ${NEW}"

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Dry run: not creating or pushing tags."
            exit 0
          fi

          for mod in "${MODULES[@]}"; do
            TAG="${mod}/${VERSION}"
            if git rev-parse "${TAG}" >/dev/null 2>&1; then
              echo "Tag ${TAG} already exists, skipping"
              continue
            fi
            echo "Tagging ${TAG}"
            git tag -a "${TAG}" -m "${mod} ${VERSION}"
          done
          git push origin --tags
