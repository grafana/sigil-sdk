name: Publish .NET SDK to NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'grafana/sigil-sdk' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Get secrets from Vault
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@f1614b210386ac420af6807a997ac7f6d96e477a # get-vault-secrets/v1.3.1
        env:
          VAULT_INSTANCE: ops
        with:
          vault_instance: ${{ env.VAULT_INSTANCE }}
          common_secrets: |
            NUGET_API_KEY=sigil-nuget:api-key
          export_env: false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1

      - name: Pack
        env:
          PKG_VERSION: ${{ inputs.version }}
        run: |
          dotnet pack dotnet/Sigil.DotNet.slnx -c Release \
            -p:PackageVersion="${PKG_VERSION}"

      # TODO Use NuGet trusted publishing https://learn.microsoft.com/nuget/nuget-org/trusted-publishing
      - name: Publish
        env:
          NUGET_API_KEY: ${{ fromJSON(steps.get-secrets.outputs.secrets).NUGET_API_KEY }}
        run: |
          dotnet nuget push "dotnet/artifacts/package/release/*.nupkg" \
            --api-key "${NUGET_API_KEY}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
