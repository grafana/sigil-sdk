name: Publish .NET SDK to NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver bump type (major / minor / patch)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: 'Preview only, do not publish or push tags'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    if: github.repository == 'grafana/sigil-sdk' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      new-version: ${{ steps.bump.outputs.new-version }}
      tag: ${{ steps.bump.outputs.tag }}

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
      DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
      FORCE_COLOR: 3
      NUGET_XMLDOC_MODE: skip
      TERM: xterm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Compute next version
        id: bump
        shell: bash
        env:
          BUMP: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          CURRENT=$(git tag -l 'sdk-dotnet/v*' | sed 's|sdk-dotnet/v||' | sort -V | tail -1)
          CURRENT=${CURRENT:-0.0.0}
          NEW=$(./.github/scripts/bump-version.sh "$BUMP" "$CURRENT")

          echo "new-version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=sdk-dotnet/v${NEW}" >> "$GITHUB_OUTPUT"

          {
            echo "## .NET SDK release plan"
            echo ""
            echo "- bump type: \`${BUMP}\`"
            echo "- current: \`${CURRENT}\`"
            echo "- new: \`${NEW}\`"
            echo "- tag: \`sdk-dotnet/v${NEW}\`"
            echo "- dry-run: \`${DRY_RUN}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          global-json-file: dotnet/global.json

      - name: Pack
        env:
          PKG_VERSION: ${{ steps.bump.outputs.new-version }}
        run: |
          dotnet pack dotnet/Sigil.DotNet.slnx -c Release \
            -p:PackageVersion="${PKG_VERSION}"

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dotnet-packages
          path: ./dotnet/artifacts/package/release
          retention-days: 5

  publish:
    if: ${{ !inputs.dry-run }}
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: NuGet.org
      url: https://www.nuget.org/profiles/Grafana

    permissions:
      contents: read
      id-token: write

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
      TERM: xterm

    steps:
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1

      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dotnet-packages
          path: packages/

      - name: NuGet log in
        uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1.1.0
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USERNAME }}

      - name: Publish
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          dotnet nuget push "packages/*.nupkg" \
            --api-key "${NUGET_API_KEY}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  tag:
    if: ${{ !inputs.dry-run }}
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Get secrets from Vault
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@f1614b210386ac420af6807a997ac7f6d96e477a # get-vault-secrets/v1.3.1
        env:
          VAULT_INSTANCE: ops
        with:
          vault_instance: ${{ env.VAULT_INSTANCE }}
          common_secrets: |
            GITHUB_APP_ID=plugins-platform-bot-app:app-id
            GITHUB_APP_PRIVATE_KEY=plugins-platform-bot-app:private-key
          export_env: false

      - name: Generate GitHub token
        id: generate-github-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ fromJSON(steps.get-secrets.outputs.secrets).GITHUB_APP_ID }}
          private-key: ${{ fromJSON(steps.get-secrets.outputs.secrets).GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-github-token.outputs.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name 'grafana-plugins-platform-bot[bot]'
          git config user.email '144369747+grafana-plugins-platform-bot[bot]@users.noreply.github.com'

      - name: Push tag
        env:
          TAG: ${{ needs.build.outputs.tag }}
          VERSION: ${{ needs.build.outputs.new-version }}
        run: |
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
          git tag -f -a "${TAG}" -m ".NET SDK ${VERSION}"
          git push origin "${TAG}"
