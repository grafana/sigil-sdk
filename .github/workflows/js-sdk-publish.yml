name: Publish JS SDK to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver bump type (major / minor / patch)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: 'Preview only, do not publish, open a PR, or push tags'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    if: github.repository == 'grafana/sigil-sdk' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.bump.outputs.new-version }}
      tag: ${{ steps.bump.outputs.tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install

      - name: Bump version
        id: bump
        shell: bash
        env:
          BUMP: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          CURRENT=$(node -p "require('./js/package.json').version")
          (cd js && npm version "$BUMP" --no-git-tag-version >/dev/null)
          NEW=$(node -p "require('./js/package.json').version")

          echo "new-version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=sdk-js/v${NEW}" >> "$GITHUB_OUTPUT"

          {
            echo "## JS SDK release plan"
            echo ""
            echo "- bump type: \`${BUMP}\`"
            echo "- current: \`${CURRENT}\`"
            echo "- new: \`${NEW}\`"
            echo "- tag: \`sdk-js/v${NEW}\`"
            echo "- dry-run: \`${DRY_RUN}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        run: pnpm --filter @grafana/sigil-sdk-js run build

      - name: Pack tarball
        working-directory: js
        run: |
          mkdir -p ../tarballs
          pnpm pack --pack-destination ../tarballs
          mv ../tarballs/grafana-sigil-sdk-js-*.tgz ../tarballs/sdk-js.tgz

      - name: Upload tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdk-js-tarball
          path: tarballs/
          retention-days: 5

  publish:
    if: ${{ !inputs.dry-run }}
    needs: build
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - name: Download tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sdk-js-tarball
          path: tarballs/

      - name: Publish to npm
        run: npm publish ./tarballs/sdk-js.tgz --access public

  tag:
    if: ${{ !inputs.dry-run }}
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Get secrets from Vault
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@f1614b210386ac420af6807a997ac7f6d96e477a # get-vault-secrets/v1.3.1
        env:
          VAULT_INSTANCE: ops
        with:
          vault_instance: ${{ env.VAULT_INSTANCE }}
          common_secrets: |
            GITHUB_APP_ID=plugins-platform-bot-app:app-id
            GITHUB_APP_PRIVATE_KEY=plugins-platform-bot-app:private-key
          export_env: false

      - name: Generate GitHub token
        id: generate-github-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ fromJSON(steps.get-secrets.outputs.secrets).GITHUB_APP_ID }}
          private-key: ${{ fromJSON(steps.get-secrets.outputs.secrets).GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-github-token.outputs.token }}
          persist-credentials: true

      - name: Setup Git
        run: |
          git config user.name 'grafana-plugins-platform-bot[bot]'
          git config user.email '144369747+grafana-plugins-platform-bot[bot]@users.noreply.github.com'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Open release PR and push tag
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          GH_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          NEW_VERSION: ${{ needs.build.outputs.new-version }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          (cd js && npm version "${NEW_VERSION}" --no-git-tag-version --allow-same-version >/dev/null)

          BRANCH="release/sdk-js-${NEW_VERSION}"
          git checkout -b "${BRANCH}"
          git add js/package.json
          git commit -m "chore(sdk-js): bump version to ${NEW_VERSION}"

          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
          git tag -f -a "${TAG}" -m "JS SDK ${NEW_VERSION}"
          git push origin "${BRANCH}" --tags

          gh pr create \
            --title "chore(sdk-js): bump version to ${NEW_VERSION}" \
            --body "Auto-generated by the JS SDK publish workflow." \
            --base main \
            --head "${BRANCH}"

          gh pr merge "${BRANCH}" --auto --squash --delete-branch
